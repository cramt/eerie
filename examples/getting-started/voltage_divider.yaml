name: Voltage Divider
components:
  - id: V1
    type_id: dc_voltage
    label: V1
    position:
      x: 0
      y: 0
    properties:
      voltage: 5
  - id: R1
    type_id: resistor
    label: R1
    position:
      x: 4
      y: -3
    rotation: 90
    properties:
      resistance: 1000
  - id: R2
    type_id: resistor
    label: R2
    position:
      x: 4
      y: 3
    rotation: 90
    properties:
      resistance: 2000
  - id: GND1
    type_id: ground
    position:
      x: 0
      y: 6
    properties: {}
nets:
  - id: VIN
    segments:
      - start: &a1
          x: 0
          y: -6
        end: &a2
          x: 4
          y: -6
      - start: *a1
        end:
          x: 0
          y: -2
      - start: *a2
        end:
          x: 4
          y: -5
    pins:
      - component_id: V1
        pin_id: p
      - component_id: R1
        pin_id: p
    labels: []
  - id: GND
    segments:
      - start:
          x: 0
          y: 5
        end:
          x: 4
          y: 5
    pins:
      - component_id: V1
        pin_id: n
      - component_id: R2
        pin_id: n
      - component_id: GND1
        pin_id: p
    labels: []
  - id: 527c3110-3c9f-48b5-ac0f-738a5ede569d
    segments:
      - start:
          x: 0
          y: 2
        end:
          x: 0
          y: 5
    pins:
      - component_id: V1
        pin_id: n
      - component_id: GND1
        pin_id: p
    labels: []
  - id: 0ceff15d-6cdc-4420-897a-37554b7f9273
    segments:
      - start:
          x: 4
          y: -1
        end:
          x: 4
          y: 1
    pins:
      - component_id: R1
        pin_id: n
      - component_id: R2
        pin_id: p
    labels: []
