# Voltage divider: 5 V source → R1=1 kΩ → R2=2 kΩ → GND
# Expected DC result: V(VMID) ≈ 3.333 V

name: Voltage Divider

components:

  - id: V1
    type_id: dc_voltage
    label: V1
    position: { x: 0, y: 0 }
    properties:
      voltage: { Float: 5.0 }

  - id: R1
    type_id: resistor
    label: R1
    position: { x: 4, y: -3 }
    rotation: 90
    properties:
      resistance: { Float: 1000.0 }

  - id: R2
    type_id: resistor
    label: R2
    position: { x: 4, y: 3 }
    rotation: 90
    properties:
      resistance: { Float: 2000.0 }

  - id: GND1
    type_id: ground
    position: { x: 0, y: 6 }

nets:

  - id: VIN
    segments:
      - start: { x: 0, y: -6 }
        end:   { x: 4, y: -6 }
    pins:
      - component_id: V1
        pin_id: p
      - component_id: R1
        pin_id: p

  - id: VMID
    segments:
      - start: { x: 4, y: -1 }
        end:   { x: 4, y: 1 }
      - start: { x: 4, y: 0 }
        end:   { x: 8, y: 0 }
    pins:
      - component_id: R1
        pin_id: n
      - component_id: R2
        pin_id: p
    labels:
      - name: VMID
        position: { x: 9, y: 0 }

  - id: GND
    segments:
      - start: { x: 0, y: 5 }
        end:   { x: 4, y: 5 }
    pins:
      - component_id: V1
        pin_id: n
      - component_id: R2
        pin_id: n
      - component_id: GND1
        pin_id: p
