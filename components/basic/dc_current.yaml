id: dc_current
name: DC Current Source
description: Ideal DC current source
category: sources
subcategory: current_sources
keywords: [I, amp, source, dc, current]

pins:
  - id: p
    name: "+"
    position: { x: 0, y: -12 }
    direction: up
    pin_type: passive
  - id: n
    name: "-"
    position: { x: 0, y: 12 }
    direction: down
    pin_type: passive

symbol:
  bounds: { x: -10, y: -12, width: 20, height: 24 }
  graphics:
    - kind: circle
      cx: 0.0
      cy: 0.0
      r: 10.0
      stroke_width: 1.5
    - kind: line
      x1: 0.0
      y1: -12.0
      x2: 0.0
      y2: -6.0
      stroke_width: 1.5
    - kind: line
      x1: 0.0
      y1: -6.0
      x2: 0.0
      y2: 6.0
      stroke_width: 1.5
    - kind: line
      x1: -3.0
      y1: 3.0
      x2: 0.0
      y2: 6.0
      stroke_width: 1.5
    - kind: line
      x1: 3.0
      y1: 3.0
      x2: 0.0
      y2: 6.0
      stroke_width: 1.5
    - kind: line
      x1: 0.0
      y1: 6.0
      x2: 0.0
      y2: 12.0
      stroke_width: 1.5

properties:
  - id: current
    label: Current
    unit: A
    property_type: float
    default: { Float: 0.001 }
    si_prefixes: true

simulation:
  model_type: spice_primitive
  netlist: "I{label} {p} {n} DC {current}"
